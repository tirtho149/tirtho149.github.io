# SITE PARAMETERS
# Docs: https://docs.hugoblox.com/

# Appearance
appearance:
  theme_day: minimal
  theme_night: minimal
  font: minimal
  font_size: L

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'Tirtho Roy — software & machine-learning engineer and researcher at Iowa State University (Translational AI Center). Agentic vision-language systems, LLM/VLM evaluation, and AI for agriculture, healthcare & finance.'
    twitter: ''
  google_analytics_id: 'G-VWLCWQ8FZD'
  google_site_verification: ''
  baidu_site_verification: ''

# Site header
header:
  navbar:
    enable: true
    align: l
    show_logo: true
    show_language: false
    show_day_night: true
    show_search: true
    highlight_active_link: true

# Site footer
footer:
  copyright:
    notice: '© {year} Tirtho Roy. All rights reserved.'
    license:
      enable: false
      allow_commercial: false
      allow_derivatives: false
      allow_reproduction: true
      allow_distribution: true
      condition: true
      license_url: ''

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '15:04'

# Site features
features:
  syntax_highlighter:
    theme_light: github-light
    theme_dark: dracula
  math:
    enable: true
  diagram:
    enable: false
  privacy_pack:
    enable: false
  repository:
    url_project: 'https://github.com/tirtho149'
    content_dir: content
    branch: main

# Extensions
extensions:
  cms:
    branch: main
    local_backend: false
  academicons:
    enable: true

# Security
security:
  allow_frame: false
  allow_scripts: true
  allow_forms: true
