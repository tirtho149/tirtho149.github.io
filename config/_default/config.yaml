# Configuration of Hugo
# Guide: https://docs.hugoblox.com/
# Hugo Documentation: https://gohugo.io/getting-started/configuration/#all-configuration-settings

title: Tirtho Roy # Website title
baseurl: 'https://tirtho149.github.io/' # Website URL

############################
## THEME (Hugo module)
############################

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5

############################
## LANGUAGE
############################

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

############################
## ADVANCED
############################

enableGitInfo: false
summaryLength: 30
pagination:
  pagerSize: 10
enableEmoji: true
enableRobotsTXT: true
footnotereturnlinkcontents: <sup>^</sup>
ignoreFiles: [\.ipynb$, .ipynb_checkpoints$, \.Rmd$, \.Rmarkdown$, _cache$]
permalinks:
  post: /post/:slug/
  publication: /publication/:slug/
  project: /project/:slug/
  talk: /talk/:slug/

outputs:
  home:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
    - RSS
    - JSON

imaging:
  resampleFilter: lanczos
  quality: 90
  anchor: smart

timeout: 600000
minify:
  minifyOutput: true

# Allow the Hugo Blox / Wowchemy theme to read its WC_* build env vars.
security:
  funcs:
    getenv:
      - '^HUGO_'
      - '^CI$'
      - '^WC_'
      - '^NETLIFY'
